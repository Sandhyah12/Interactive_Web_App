<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <title>Signup - CycleCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://image.winudf.com/v2/image1/Y29tLm1uLm92dWxhdGlvbnRyYWNrZXIucGVyaW9kY2FsZW5kYXIucGVyaW9kdHJhY2tlcl9pY29uXzE2OTQ0ODE1NTNfMDM4/icon.png?w=102&fakeurl=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
<style>

    body{
        background:#fff5f8;
        font-family:'Segoe UI', sans-serif;
        }

        .signup-card{
        max-width:420px;
        margin:auto;
        margin-top:80px;
        background:#fff8fb;
        padding:35px;
        border-radius:20px;
        box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .btn-pink{
        background:#d63384;
        color:white;
        border:none;
        }

        .btn-pink:hover{
        background:#c2186a;
        }

    </style>

    </head>

<body>
     <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="login.html">
            <img src="https://image.winudf.com/v2/image1/Y29tLm1uLm92dWxhdGlvbnRyYWNrZXIucGVyaW9kY2FsZW5kYXIucGVyaW9kdHJhY2tlcl9pY29uXzE2OTQ0ODE1NTNfMDM4/icon.png?w=102&fakeurl=1">
            CycleCare
        </a>

        <!-- Hamburger button -->
        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Menu -->
        <div class="offcanvas offcanvas-start offcanvas-lg" id="mobileMenu">

            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Menu</h5>
                <button type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="home.html">Home</a>
                    <a class="nav-link active" href="login.html">Login</a>
                    <a class="nav-link" href="tracker.html">Tracker</a>
                    <a class="nav-link" href="history.html">History</a>
                    <a class="nav-link" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </div>
    </nav>

    <div class="container">

        <div class="signup-card">

            <h3 class="text-center text-danger mb-4">Create Account 💗</h3>

            <form onsubmit="registerUser(event)">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" required>
                </div>

                <button class="btn btn-pink w-100">
                Sign Up
                </button>

                <p class="text-center mt-3">
                    Already have an account? 
                    <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>
    <!-- Footer -->
        <footer class="bg-dark-pink text-white py-4 mt-5">
            <div class="container text-center">
                <p class="mb-0">&copy; 2026 CycleCare | Designed for Women's Health 💗</p>
            </div>
        </footer>


    <script>

        function registerUser(event){
        event.preventDefault();

        alert("Account created successfully!");

        window.location.href="login.html";
        }

    </script>

</body>
</html>
